<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Contacto | ALPHA-HELP</title>

  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/dashboard.css" />

</head>

<body>

<div class="dashboard-grid">

  <div id="sidebar"></div>

  <main class="dashboard-content">

    <header class="dashboard-header">

      <h1 class="dashboard-title">
        Contacto
      </h1>

      <p class="dashboard-subtitle">
        Ponte en contacto con el equipo.
      </p>

    </header>

    <form class="card auth-form profile-card">

      <input
        class="input"
        type="text"
        placeholder="Asunto"
        required
      />

      <textarea
        class="input"
        rows="6"
        placeholder="Mensaje"
        required
      ></textarea>

      <button class="button">
        Enviar mensaje
      </button>

    </form>

  </main>

</div>

<script type="module">

  import { initGuard } from '/src/lib/router.js'
  import { createSidebar } from '/src/components/layout.js'

  await initGuard()

  document.getElementById('sidebar').innerHTML =
    createSidebar('contact')

</script>

</body>
</html>
