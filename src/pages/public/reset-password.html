<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Nueva contraseña | ALPHA-HELP</title>

  <meta
    name="description"
    content="Restablecimiento seguro de contraseña."
  />

  <meta
    name="robots"
    content="noindex,nofollow"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/auth.css" />

</head>

<body>

<main class="auth-layout">

  <!-- HERO -->
  <section class="auth-hero">

    <div class="auth-hero-content">

      <img
        src="/src/assets/images/logo.png"
        alt="ALPHA-HELP"
        class="auth-hero-logo"
      />

      <span class="auth-badge">
        Seguridad de cuenta
      </span>

      <h1>
        Establece una nueva contraseña.
      </h1>

      <p>
        Utiliza una contraseña segura para proteger tu cuenta.
      </p>

    </div>

  </section>

  <!-- PANEL -->
  <section class="auth-panel">

    <div class="auth-card card">

      <div class="auth-card-header">

        <h2>
          Nueva contraseña
        </h2>

        <p>
          Introduce tu nueva contraseña.
        </p>

      </div>

      <form
        id="reset-form"
        class="auth-form"
        novalidate
      >

        <input
          id="password"
          class="input"
          type="password"
          placeholder="Nueva contraseña"
          autocomplete="new-password"
          minlength="8"
          required
        />

        <input
          id="confirm-password"
          class="input"
          type="password"
          placeholder="Confirmar contraseña"
          autocomplete="new-password"
          minlength="8"
          required
        />

        <p
          id="form-error"
          class="form-error hidden"
        ></p>

        <p
          id="form-success"
          class="form-success hidden"
        ></p>

        <button
          id="reset-btn"
          class="button"
          type="submit"
        >

          <span class="button-text">
            Actualizar contraseña
          </span>

          <span class="button-loader hidden">
            <span class="spinner-small"></span>
          </span>

        </button>

      </form>

      <div class="auth-links">

        <a href="/src/pages/public/login.html">
          Volver al login
        </a>

      </div>

    </div>

  </section>

</main>

<script type="module">

  import {
    updatePassword
  } from '/src/lib/auth.js'

  import {
    getPasswordError
  } from '/src/utils/validators.js'

  const form =
    document.getElementById('reset-form')

  const passwordInput =
    document.getElementById('password')

  const confirmInput =
    document.getElementById(
      'confirm-password'
    )

  const errorEl =
    document.getElementById('form-error')

  const successEl =
    document.getElementById('form-success')

  const submitBtn =
    document.getElementById('reset-btn')

  function setButtonLoading(state) {

    submitBtn.classList.toggle(
      'loading',
      state
    )

    submitBtn.disabled = state

    submitBtn
      .querySelector('.button-text')
      .classList.toggle('hidden', state)

    submitBtn
      .querySelector('.button-loader')
      .classList.toggle('hidden', !state)

  }

  function showError(message) {

    errorEl.textContent = message

    errorEl.classList.remove('hidden')

    successEl.classList.add('hidden')
  }

  function showSuccess(message) {

    successEl.textContent = message

    successEl.classList.remove('hidden')

    errorEl.classList.add('hidden')
  }

  function setInputError(input) {

    input.classList.add('error')

    input.classList.remove('success')
  }

  function setInputSuccess(input) {

    input.classList.remove('error')

    input.classList.add('success')
  }

  form.addEventListener('submit', async (e) => {

    e.preventDefault()

    errorEl.classList.add('hidden')

    const password =
      passwordInput.value.trim()

    const confirm =
      confirmInput.value.trim()

    const validation =
      getPasswordError(password)

    if (validation) {

      setInputError(passwordInput)

      showError(validation)

      return
    }

    if (password !== confirm) {

      setInputError(confirmInput)

      showError(
        'Las contraseñas no coinciden.'
      )

      return
    }

    try {

      setButtonLoading(true)

      setInputSuccess(passwordInput)

      setInputSuccess(confirmInput)

      await updatePassword(password)

      showSuccess(
        'Contraseña actualizada correctamente.'
      )

      form.reset()

      setTimeout(() => {

        window.location.replace(
          '/src/pages/public/login.html'
        )

      }, 1200)

    } catch (error) {

      showError(error.message)

    } finally {

      setButtonLoading(false)

    }

  })

</script>

</body>
</html>
