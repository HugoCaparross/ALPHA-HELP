<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Recuperar contraseña | ALPHA-HELP</title>

  <meta
    name="description"
    content="Recuperación segura de contraseña."
  />

  <meta
    name="robots"
    content="noindex,nofollow"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/auth.css" />

</head>

<body>

<main class="auth-layout">

  <!-- HERO -->
  <section class="auth-hero">

    <div class="auth-hero-content">

      <img
        src="/src/assets/images/logo.png"
        alt="ALPHA-HELP"
        class="auth-hero-logo"
      />

      <span class="auth-badge">
        Recuperación segura
      </span>

      <h1>
        Recupera el acceso a tu cuenta.
      </h1>

      <p>
        Te enviaremos un enlace seguro para restablecer tu contraseña.
      </p>

    </div>

  </section>

  <!-- PANEL -->
  <section class="auth-panel">

    <div class="auth-card card">

      <div class="auth-card-header">

        <h2>
          Recuperar contraseña
        </h2>

        <p>
          Introduce tu correo electrónico.
        </p>

      </div>

      <form
        id="forgot-form"
        class="auth-form"
        novalidate
      >

        <input
          id="email"
          class="input"
          type="email"
          placeholder="Correo electrónico"
          autocomplete="email"
          required
        />

        <p
          id="form-error"
          class="form-error hidden"
        ></p>

        <p
          id="form-success"
          class="form-success hidden"
        ></p>

        <button
          id="forgot-btn"
          class="button"
          type="submit"
        >

          <span class="button-text">
            Enviar enlace
          </span>

          <span class="button-loader hidden">
            <span class="spinner-small"></span>
          </span>

        </button>

      </form>

      <div class="auth-links">

        <a href="/src/pages/public/login.html">
          Volver al login
        </a>

      </div>

    </div>

  </section>

</main>

<script type="module">

  import {
    resetPassword
  } from '/src/lib/auth.js'

  import {
    sanitizeEmail,
    getEmailError
  } from '/src/utils/validators.js'

  const form =
    document.getElementById('forgot-form')

  const emailInput =
    document.getElementById('email')

  const errorEl =
    document.getElementById('form-error')

  const successEl =
    document.getElementById('form-success')

  const submitBtn =
    document.getElementById('forgot-btn')

  function setButtonLoading(state) {

    submitBtn.classList.toggle(
      'loading',
      state
    )

    submitBtn.disabled = state

    submitBtn
      .querySelector('.button-text')
      .classList.toggle('hidden', state)

    submitBtn
      .querySelector('.button-loader')
      .classList.toggle('hidden', !state)

  }

  function showError(message) {

    errorEl.textContent = message

    errorEl.classList.remove('hidden')

    successEl.classList.add('hidden')
  }

  function showSuccess(message) {

    successEl.textContent = message

    successEl.classList.remove('hidden')

    errorEl.classList.add('hidden')
  }

  form.addEventListener('submit', async (e) => {

    e.preventDefault()

    errorEl.classList.add('hidden')

    const email =
      sanitizeEmail(
        emailInput.value
      )

    const validation =
      getEmailError(email)

    if (validation) {

      showError(validation)

      return
    }

    try {

      setButtonLoading(true)

      await resetPassword(email)

      showSuccess(
        'Se ha enviado un enlace de recuperación.'
      )

      form.reset()

    } catch (error) {

      showError(error.message)

    } finally {

      setButtonLoading(false)

    }

  })

</script>

</body>
</html>
