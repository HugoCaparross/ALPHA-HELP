<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceder - ALPHA-HELP</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="../../styles/variables.css">
  <link rel="stylesheet" href="../../styles/auth.css">
</head>
<body>
  <main class="auth-container" id="login-page">
    <h1>Iniciar Sesión</h1>
    <form id="frm-login">
      <label for="txt-email">Email</label>
      <input type="email" id="txt-email" required autocomplete="username">
      <label for="txt-password">Contraseña</label>
      <input type="password" id="txt-password" required autocomplete="current-password">
      <button type="submit" id="btn-login-submit">Acceder</button>
    </form>
  </main>
  <script type="module" src="../../auth/login.js"></script>
</body>
</html>
