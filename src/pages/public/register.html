<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - ALPHA-HELP</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="../../styles/variables.css">
  <link rel="stylesheet" href="../../styles/auth.css">
</head>
<body>
  <main class="auth-container" id="register-page">
    <h1>Crear Cuenta</h1>
    <form id="frm-register">
      <label for="txt-reg-email">Email</label>
      <input type="email" id="txt-reg-email" required autocomplete="username">
      <label for="txt-reg-password">Contraseña</label>
      <input type="password" id="txt-reg-password" required autocomplete="new-password">
      <button type="submit" id="btn-register-submit">Registrarse</button>
    </form>
  </main>
  <script type="module" src="../../auth/register.js"></script>
</body>
</html>
